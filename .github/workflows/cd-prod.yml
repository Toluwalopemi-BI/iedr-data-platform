# ===========================================================================
# IEDR CD — Deploy to PROD on tagged release to main
# ===========================================================================
# Requires manual approval via GitHub Environment protection rules.
# Does NOT auto-trigger DLT run — operator confirms in Databricks UI.
# ===========================================================================
name: IEDR Deploy to PROD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy-prod:
    name: "Deploy to PRODUCTION"
    runs-on: ubuntu-latest
    environment: production    # Requires manual approval
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: databricks bundle validate -t prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

      - name: Deploy to PROD
        run: databricks bundle deploy -t prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}

      # NOTE: Intentionally does NOT auto-trigger DLT run.
      # Operator reviews deployment in Databricks UI, then triggers manually.

      - name: Post-deploy notification
        if: success()
        run: |
          echo "✅ PROD deployment successful."
          echo "Deployed ref: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "⚠️  DLT pipeline NOT auto-triggered."
          echo "   Operator must trigger manually in Databricks workspace."
