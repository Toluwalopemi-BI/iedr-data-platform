# ===========================================================================
# IEDR CD — Auto-Deploy to TEST on merge to develop
# ===========================================================================
name: IEDR Deploy to TEST

on:
  push:
    branches: [develop]

jobs:
  deploy-test:
    name: "Deploy to TEST"
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: databricks bundle validate -t test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_TEST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_TEST }}

      - name: Deploy to TEST
        run: databricks bundle deploy -t test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_TEST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_TEST }}

      - name: Trigger DLT Pipeline Run
        run: databricks bundle run iedr_dlt_pipeline -t test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_TEST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_TEST }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::TEST deployment failed. Check Databricks workspace."
