# ===========================================================================
# IEDR CI Pipeline — Runs on every Pull Request
# ===========================================================================
name: IEDR Pipeline CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint check
        run: ruff check pipelines/ shared/ tests/
      - name: Format check
        run: ruff format --check pipelines/ shared/ tests/

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyspark pytest chispa pyyaml
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  schema-validate:
    name: "Schema Contract Validation"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Validate schema contracts
        run: python tests/validate_schemas.py
